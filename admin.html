<!DOCTYPE html>
<html lang="uz">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>BoomBurger — Admin Panel</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
    :root{
        --black:#0F0F0F;
        --dark:#1A1A1A;
        --gold:#F5C518;
        --red:#E53935;
    }
    *{margin:0;padding:0;box-sizing:border-box}
    body{font-family:'Segoe UI',sans-serif;background:#0F0F0F;color:#eee;min-height:100vh}

    /* LOGIN (oldingi kabi) */
    .login-page{display:flex;align-items:center;justify-content:center;min-height:100vh;background:var(--black)}
    .login-box{background:var(--dark);border-radius:24px;padding:40px 32px;width:380px;text-align:center;box-shadow:0 20px 60px rgba(0,0,0,0.6)}
    .login-logo{font-size:80px;margin-bottom:16px}
    .login-title{color:var(--gold);font-size:28px;font-weight:900;margin-bottom:4px}
    .login-subtitle{color:#888;font-size:15px;margin-bottom:32px}
    .login-input{width:100%;background:#222;border:2px solid #444;border-radius:12px;padding:14px 16px;color:white;font-size:16px;outline:none;margin-bottom:16px}
    .login-input:focus{border-color:var(--gold)}
    .login-btn{width:100%;background:var(--gold);color:black;border:none;padding:15px;border-radius:12px;font-size:17px;font-weight:700;cursor:pointer}
    .login-btn:hover{background:#FFD700}

    /* APP */
    .app{display:none;min-height:100vh}
    .sidebar{position:fixed;left:0;top:0;bottom:0;width:260px;background:var(--black);padding:20px 0}
    .sidebar-logo{font-size:24px;font-weight:900;color:var(--gold);padding:0 20px 30px;display:flex;align-items:center;gap:10px}
    .menu-item{padding:14px 24px;color:#aaa;cursor:pointer;display:flex;align-items:center;gap:12px;font-size:15px}
    .menu-item:hover,.menu-item.active{background:#1F1F1F;color:var(--gold)}

    .main{margin-left:260px;padding:24px}
    .page-title{font-size:26px;font-weight:800;margin-bottom:20px;color:var(--gold)}

    .order-card{
        background:var(--dark);
        padding:16px;
        margin-bottom:12px;
        border-radius:12px;
        border-left:4px solid var(--red);
    }
    .status{
        padding:4px 12px;
        border-radius:20px;
        font-size:13px;
        font-weight:600;
    }
    .status-new{background:#FF9800;color:black}
    .status-accepted{background:#4CAF50;color:white}
    .status-ready{background:#2196F3;color:white}
    .status-completed{background:#9C27B0;color:white}
</style>
</head>
<body>

<!-- LOGIN -->
<div class="login-page" id="loginPage">
  <div class="login-box">
    <div class="login-logo">🍔</div>
    <div class="login-title">BoomBurger</div>
    <div class="login-subtitle">Admin Panel</div>
    <input class="login-input" type="text" id="loginUser" placeholder="Login" value="admin"/>
    <input class="login-input" type="password" id="loginPass" placeholder="Parol" maxlength="6" onkeydown="if(event.key==='Enter')doLogin()"/>
    <button class="login-btn" onclick="doLogin()">Kirish</button>
  </div>
</div>

<!-- APP -->
<div class="app" id="app">
  <div class="sidebar">
    <div class="sidebar-logo">🍔 BoomBurger</div>
    <div class="menu-item active" onclick="showPage('orders')">📋 Buyurtmalar</div>
    <div class="menu-item" onclick="showPage('products')">🍔 Mahsulotlar</div>
    <div class="menu-item" onclick="showPage('shifts')">⏰ Smena</div>
    <div class="menu-item" onclick="showPage('stats')">📊 Statistika</div>
    <div class="menu-item" onclick="showPage('settings')">⚙️ Sozlamalar</div>
  </div>

  <div class="main">
    <!-- BUYURTMALAR SAHIFASI -->
    <div id="page-orders">
      <div class="page-title">📋 Buyurtmalar</div>
      <input type="text" id="searchOrder" placeholder="Buyurtma raqami yoki telefon bo'yicha qidirish..." style="width:100%;padding:12px;border-radius:12px;background:#222;border:none;color:white;margin-bottom:20px" oninput="filterOrders()">
      <div id="ordersList">Yuklanmoqda...</div>
    </div>

    <!-- Boshqa sahifalar -->
    <div id="page-products" style="display:none"><div class="page-title">🍔 Mahsulotlar</div><p style="color:#aaa">Tez orada...</p></div>
    <div id="page-shifts" style="display:none"><div class="page-title">⏰ Smena</div><button onclick="openShift()">Smena Ochish</button></div>
    <div id="page-stats" style="display:none"><div class="page-title">📊 Statistika</div><p style="color:#aaa">Tez orada...</p></div>
    <div id="page-settings" style="display:none">
      <div class="page-title">⚙️ Sozlamalar</div>
      <div style="background:#1A1A1A;padding:20px;border-radius:12px;max-width:500px">
        <h3>Boom Coin</h3>
        <label>Boom Coin foizi (%): </label>
        <input type="number" id="coinPercent" value="3" style="padding:8px;width:80px"/>
        <button onclick="saveCoinPercent()">Saqlash</button>
      </div>
    </div>
  </div>
</div>

<script>
// SUPABASE
const SUPABASE_URL = 'https://guybadsywmttnizlhtdf.supabase.co';
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imd1eWJhZHN5d210dG5pemxodGRmIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODI3NjE2MTUsImV4cCI6MjA5ODMzNzYxNX0.SMsB8fl8PqPAQGRMutMOmtFhRTqzOa_SJepr-KTA7O4';
const { createClient } = supabase;
const db = createClient(SUPABASE_URL, SUPABASE_KEY);

const ADMIN_LOGIN = "admin";
const ADMIN_PASS = "123456";

let allOrders = [];

function doLogin() {
  const login = document.getElementById('loginUser').value.trim();
  const pass = document.getElementById('loginPass').value.trim();
  if (login === ADMIN_LOGIN && pass === ADMIN_PASS) {
    document.getElementById('loginPage').style.display = 'none';
    document.getElementById('app').style.display = 'block';
    checkShift();
    loadOrders();
  } else {
    alert("Login yoki parol noto'g'ri!");
  }
}

async function checkShift() {
  const {data} = await db.from('shifts').select('id').eq('status','open').limit(1);
  if (!data || data.length === 0) {
    if (confirm("Hozirgi smena ochilmagan.\nSmena ochilsinmi?")) {
      await db.from('shifts').insert({status:'open', opened_at: new Date().toISOString()});
      alert("✅ Smena ochildi!");
    }
  }
}

async function loadOrders() {
  const container = document.getElementById('ordersList');
  container.innerHTML = "Yuklanmoqda...";

  try {
    const {data, error} = await db
      .from('orders')
      .select('*')
      .order('created_at', {ascending: false});

    console.log("✅ Supabase dan kelayotgan buyurtmalar:", data);  // Bu juda muhim!

    if (error) {
      container.innerHTML = `<p style="color:red">Xato: ${error.message}</p>`;
      console.error(error);
      return;
    }

    allOrders = data || [];
    if (allOrders.length === 0) {
      container.innerHTML = `<p style="color:#aaa">Hozircha buyurtma yo'q. Bot orqali yangi buyurtma yuboring.</p>`;
    } else {
      renderOrders(allOrders);
    }
  } catch(e) {
    container.innerHTML = `<p style="color:red">Xatolik: ${e.message}</p>`;
  }
}

function renderOrders(orders) {
  const container = document.getElementById('ordersList');
  if (!orders.length) {
    container.innerHTML = "<p style='color:#aaa;padding:20px'>Buyurtma topilmadi</p>";
    return;
  }
  let html = '';
  orders.forEach(o => {
    const statusClass = o.status === 'new' ? 'status-new' : o.status === 'accepted' ? 'status-accepted' : 'status-new';
    html += `
      <div class="order-card">
        <strong>#${o.order_number}</strong> — ${o.total.toLocaleString()} so'm<br>
        <small>${o.customer_phone} | ${o.delivery_type}</small><br>
        <span class="status ${statusClass}">${o.status || 'new'}</span>
        <button onclick="changeStatus('${o.id}', 'accepted')" style="margin-left:10px">Qabul qilish</button>
      </div>`;
  });
  container.innerHTML = html;
}

function filterOrders() {
  const query = document.getElementById('searchOrder').value.toLowerCase();
  const filtered = allOrders.filter(o => 
    o.order_number.toLowerCase().includes(query) || 
    (o.customer_phone && o.customer_phone.includes(query))
  );
  renderOrders(filtered);
}

async function changeStatus(id, newStatus) {
  await db.from('orders').update({status: newStatus}).eq('id', id);
  alert("Status o'zgartirildi!");
  loadOrders();
}

function showPage(page) {
  document.querySelectorAll('.main > div').forEach(d => d.style.display = 'none');
  document.getElementById('page-'+page).style.display = 'block';
}

function openShift() { alert("Smena ochildi!"); }
function saveCoinPercent() { alert("Boom Coin saqlandi!"); }
</script>
</body>
</html>
