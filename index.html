<!DOCTYPE html>
<html lang="uz">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>BoomBurger Test</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
</head>
<body style="padding:30px;font-family:sans-serif;background:#111;color:white;text-align:center">

<h1>🍔 BoomBurger Test</h1>
<p>Mini App test sahifasi</p>

<button onclick="sendTestOrder()" style="padding:15px 40px;font-size:18px;background:#E53935;color:white;border:none;border-radius:12px;cursor:pointer;margin-top:20px">
  Test Buyurtma Yuborish
</button>

<script>
function sendTestOrder() {
  const testData = {
    order: "TEST-" + Date.now(),
    total: 85000,
    items: [{name: "Classic Burger", qty: 2, price: 35000}],
    delivery: "pickup",
    payment: "cash",
    phone: "+998901234567"
  };

  if (window.Telegram?.WebApp) {
    window.Telegram.WebApp.sendData(JSON.stringify(testData));
    alert("✅ Test buyurtma yuborildi! Terminalni tekshiring.");
  } else {
    alert("Telegram ichida oching!");
  }
}

if (window.Telegram?.WebApp) {
  window.Telegram.WebApp.ready();
  window.Telegram.WebApp.expand();
}
</script>
</body>
</html>
