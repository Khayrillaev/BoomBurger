<!DOCTYPE html>
<html lang="uz">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
<title>BoomBurger</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<style>
  body {font-family:'Segoe UI',sans-serif;background:#111;color:white;padding:20px;text-align:center}
  button {padding:15px 40px;font-size:18px;background:#E53935;color:white;border:none;border-radius:12px;cursor:pointer;margin:20px}
</style>
</head>
<body>

<h1>🍔 BoomBurger</h1>
<button onclick="sendTest()">Test Buyurtma Yuborish</button>

<script>
function sendTest() {
  const testData = {
    order: "TEST-" + Date.now(),
    total: 65000,
    items: [{name: "Classic Burger", qty: 1, price: 65000}],
    delivery: "pickup",
    payment: "cash",
    phone: "+998901234567"
  };

  if (window.Telegram?.WebApp) {
    window.Telegram.WebApp.sendData(JSON.stringify(testData));
    alert("Yuborildi! Terminalni tekshiring.");
  } else {
    alert("Telegram ichida oching!");
  }
}
</script>
</body>
</html>
