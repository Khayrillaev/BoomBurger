<!DOCTYPE html>
<html lang="uz">
<head>
<meta charset="UTF-8"/>
<title>BoomBurger Test</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
</head>
<body style="padding:40px;background:#111;color:white;text-align:center">

<h1>WebApp Test</h1>
<button onclick="sendData()" style="padding:20px 40px;font-size:18px;background:#E53935;color:white;border:none;border-radius:12px">
  Ma'lumot Yuborish
</button>

<script>
function sendData() {
  const data = {test: "salom dunyo", time: new Date().toISOString()};
  
  console.log("Yuborilayotgan data:", data);

  if (window.Telegram && window.Telegram.WebApp) {
    window.Telegram.WebApp.sendData(JSON.stringify(data));
    alert("Yuborildi! Terminalni tekshiring.");
  } else {
    alert("Telegram Mini App ichida oching!");
  }
}
</script>
</body>
</html>
