<!DOCTYPE html>
<html lang="uz">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
  <title>BoomBurger</title>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <style>
    :root {
      --primary: #FF3D00;
      --dark: #0F0F0F;
      --accent: #FFD600;
      --bg: #1A1A1A;
      --card: #252525;
      --text: #EEEEEE;
      --text-light: #AAAAAA;
    }
    * { margin:0; padding:0; box-sizing:border-box; }
    body {
      font-family: 'Segoe UI', system-ui, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      padding-bottom: 85px;
    }
    .header {
      background: var(--dark);
      color: white;
      padding: 16px 18px;
      position: sticky;
      top: 0;
      z-index: 100;
      display: flex;
      align-items: center;
      box-shadow: 0 4px 15px rgba(0,0,0,0.3);
    }
    .logo {
      font-size: 26px;
      font-weight: 900;
      letter-spacing: -1px;
    }

    .tabs {
      display: flex;
      background: var(--dark);
      padding: 12px 16px;
      gap: 10px;
      overflow-x: auto;
      position: sticky;
      top: 60px;
      z-index: 99;
    }
    .tab {
      padding: 10px 20px;
      background: #2A2A2A;
      border-radius: 30px;
      white-space: nowrap;
      font-weight: 600;
      font-size: 14.5px;
      cursor: pointer;
      transition: all 0.3s;
    }
    .tab.active {
      background: var(--primary);
      color: white;
      box-shadow: 0 4px 12px rgba(255, 61, 0, 0.4);
    }

    .products {
      padding: 16px;
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(170px, 1fr));
      gap: 18px;
    }
    .product-card {
      background: var(--card);
      border-radius: 22px;
      overflow: hidden;
      box-shadow: 0 8px 20px rgba(0,0,0,0.25);
      transition: all 0.2s;
    }
    .product-card:active {
      transform: scale(0.95);
    }
    .product-img {
      height: 160px;
      background: linear-gradient(135deg, #2A2A2A, #1F1F1F);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 72px;
    }
    .product-info {
      padding: 16px;
    }
    .product-name {
      font-weight: 700;
      font-size: 16px;
      margin-bottom: 8px;
    }
    .product-price {
      color: var(--primary);
      font-weight: 800;
      font-size: 17px;
    }

    .bottom-nav {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      background: var(--dark);
      border-top: 1px solid #333;
      display: flex;
      justify-content: space-around;
      padding: 10px 0 8px;
      z-index: 1000;
    }
    .nav-item {
      text-align: center;
      font-size: 12.5px;
      color: #AAAAAA;
      cursor: pointer;
    }
    .nav-item.active {
      color: var(--primary);
      font-weight: 700;
    }
  </style>
</head>
<body>
  <div class="header">
    <div class="logo">🍔 BoomBurger</div>
  </div>

  <div class="tabs" id="categories"></div>
  <div class="products" id="products"></div>

  <div class="bottom-nav">
    <div class="nav-item active">🍔 Menu</div>
    <div class="nav-item">🛒 Savat</div>
    <div class="nav-item">📋 Buyurtmalar</div>
    <div class="nav-item">👤 Profil</div>
  </div>
