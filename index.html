<!DOCTYPE html>
<html lang="uz">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
<title>BoomBurger</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<style>
  body {font-family: 'Segoe UI',sans-serif; background:#1A1A1A; color:white; margin:0; padding-bottom:80px;}
  .header {background:#111; padding:16px; text-align:center; font-size:24px; font-weight:900;}
</style>
</head>
<body>

<div class="header">🍔 BoomBurger</div>

<div style="padding:20px;text-align:center">
  <h2>Buyurtma berish</h2>
  <p>Bu test sahifasi. Keyin to‘liq menyu qo‘shamiz.</p>
  <button onclick="testOrder()" style="padding:15px 30px;font-size:18px;background:#E53935;color:white;border:none;border-radius:12px;cursor:pointer">
    Test Buyurtma Yuborish
  </button>
</div>

<script>
function testOrder() {
  const testOrder = {
    order: "TEST123",
    total: 65000,
    items: [{name: "Classic Burger", qty: 2, price: 35000}],
    delivery: "pickup",
    payment: "cash",
    phone: "+998901234567"
  };

  if (window.Telegram?.WebApp) {
    window.Telegram.WebApp.sendData(JSON.stringify(testOrder));
    alert("Test buyurtma yuborildi!");
  } else {
    alert("Telegram WebApp topilmadi");
  }
}

if (window.Telegram?.WebApp) {
  window.Telegram.WebApp.ready();
  window.Telegram.WebApp.expand();
}
</script>
</body>
</html>
