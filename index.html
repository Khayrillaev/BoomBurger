<!DOCTYPE html>
<html lang="uz">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
  <title>BoomBurger</title>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <style>
    :root {
      --primary: #D4AF37;
      --red: #B71C1C;
      --dark: #0A0A0A;
    }
    * { margin:0; padding:0; box-sizing:border-box; }
    body {
      font-family: 'Segoe UI', system-ui, sans-serif;
      background: linear-gradient(rgba(0,0,0,0.75), rgba(0,0,0,0.85)), 
                  url('https://images.unsplash.com/photo-1517248135467-4c7edcad34b4?q=80&w=2070') no-repeat center center fixed;
      background-size: cover;
      color: white;
      min-height: 100vh;
      padding-bottom: 90px;
    }
    .header {
      background: rgba(10,10,10,0.95);
      padding: 16px 18px;
      position: sticky;
      top: 0;
      z-index: 100;
      display: flex;
      align-items: center;
      justify-content: space-between;
      box-shadow: 0 4px 15px rgba(0,0,0,0.6);
    }
    .logo {
      font-size: 26px;
      font-weight: 900;
      color: var(--primary);
      text-shadow: 0 2px 8px rgba(0,0,0,0.8);
    }
    .header-img {
      width: 50px;
      height: 50px;
      border-radius: 50%;
      object-fit: cover;
      border: 2px solid var(--primary);
    }

    .tabs {
      display: flex;
      background: rgba(10,10,10,0.9);
      padding: 14px 16px;
      gap: 12px;
      overflow-x: auto;
      position: sticky;
      top: 66px;
      z-index: 99;
    }
    .tab {
      padding: 11px 22px;
      background: rgba(255,255,255,0.1);
      border-radius: 50px;
      white-space: nowrap;
      font-weight: 600;
      cursor: pointer;
      backdrop-filter: blur(10px);
    }
    .tab.active {
      background: var(--primary);
      color: black;
    }

    .products {
      padding: 20px 16px;
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(175px, 1fr));
      gap: 20px;
    }
    .product-card {
      background: rgba(30,30,30,0.95);
      border-radius: 24px;
      overflow: hidden;
      box-shadow: 0 10px 25px rgba(0,0,0,0.5);
      border: 1px solid rgba(212,175,55,0.2);
    }
    .product-img {
      height: 170px;
      background: #1C1C1C;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 75px;
    }
    .product-info {
      padding: 16px;
    }
    .product-name {
      font-size: 16.5px;
      font-weight: 700;
      margin-bottom: 8px;
    }
    .product-price {
      color: var(--primary);
      font-size: 18px;
      font-weight: 800;
    }

    .bottom-nav {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      background: rgba(10,10,10,0.95);
      padding: 12px 0 10px;
      display: flex;
      justify-content: space-around;
      box-shadow: 0 -4px 20px rgba(0,0,0,0.6);
    }
    .nav-item {
      text-align: center;
      color: #CCC;
      font-size: 13px;
    }
    .nav-item.active {
      color: var(--primary);
    }
  </style>
</head>
<body>
  <div class="header">
    <div class="logo">BOOMBURGER</div>
    <img src="https://images.unsplash.com/photo-1600585154340-be6161a56a9c?q=80&w=100" class="header-img" alt="logo">
  </div>

  <div class="tabs" id="categories"></div>
  <div class="products" id="products"></div>

  <div class="bottom-nav">
    <div class="nav-item active">🍔 Menu</div>
    <div class="nav-item">🛒 Savat</div>
    <div class="nav-item">📋 Buyurtmalar</div>
    <div class="nav-item">👤 Profil</div>
  </div>

  <script>
    const PRODUCTS = [
      {id:1, name:"Classic BoomBurger", price:45000, emoji:"🍔"},
      {id:2, name:"Double Cheese", price:58000, emoji:"🍔"},
      {id:3, name:"Spicy Chicken", price:52000, emoji:"🐔"},
      {id:4, name:"Crispy Fries", price:22000, emoji:"🍟"},
    ];

    function renderCategories() {
      const cats = ["Barchasi", "Burgerlar", "Tovuq", "Sides", "Ichimliklar", "Setlar"];
      let html = '';
      cats.forEach((cat, i) => {
        html += `<div class="tab ${i===0 ? 'active' : ''}">${cat}</div>`;
      });
      document.getElementById('categories').innerHTML = html;
    }

    function renderProducts() {
      let html = '';
      PRODUCTS.forEach(p => {
        html += `
          <div class="product-card">
            <div class="product-img">${p.emoji}</div>
            <div class="product-info">
              <div class="product-name">${p.name}</div>
              <div class="product-price">${p.price.toLocaleString()} so'm</div>
            </div>
          </div>
        `;
      });
      document.getElementById('products').innerHTML = html;
    }

    renderCategories();
    renderProducts();
  </script>
</body>
</html>
